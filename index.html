<!DOCTYPE html>

<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Racing V3</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6a623;
text-align:center;
}

/* screens */

.screen{display:none;padding:20px}
.active{display:block}

/* menu buttons */

.menuBtn{
background:#e53935;
color:white;
border:none;
padding:20px;
width:260px;
font-size:22px;
margin:10px;
border-radius:30px;
font-weight:bold;
}

.blue{background:#3498db}
.green{background:#2ecc71}
.gray{background:#9e9e9e}

/* track */

.track{
height:220px;
background:#ddd;
border-top:6px solid #999;
border-bottom:6px solid #999;
margin-top:20px;
position:relative;
overflow:hidden;
}

.car{
position:absolute;
font-size:60px;
left:20px;
}

#player{top:40px}
#enemy{top:120px}

/* traffic light */

.light{
background:#333;
width:70px;
padding:10px;
border-radius:10px;
margin:auto;
}

.light div{
width:40px;
height:40px;
border-radius:50%;
margin:10px auto;
background:#111;
}

.red{background:red}
.yellow{background:yellow}
.greenLight{background:#0f0}

/* HUD */

.hud{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
}

.bar{
width:200px;
height:20px;
background:#555;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#8e44ad;
width:100%;
}

.speed{
font-size:26px;
}

.gear{
font-size:24px;
}

.garageCar{
font-size:70px;
}

</style>

</head>

<body>

<div>💰 $<span id="money">50000</span></div>

<!-- MENU -->

<div id="menu" class="screen active">

<button class="menuBtn" onclick="openRace()">RACE</button><br> <button class="menuBtn">RACE ONLINE</button><br> <button class="menuBtn gray" onclick="openGarage()">GARAGE</button><br> <button class="menuBtn green">CHALLENGES</button><br> <button class="menuBtn blue">TUTORIAL</button>

</div>

<!-- SETUP -->

<div id="setup" class="screen">

<h2>Race Setup</h2>

<p>Race Length</p>
<input type="range" min="100" max="10000" value="1000" id="length">

<p>Difficulty</p>
<input type="range" min="1" max="100" value="20" id="difficulty">

<br><br>

<button class="menuBtn" onclick="startLights()">START RACE</button> <button class="menuBtn gray" onclick="showMenu()">MENU</button>

</div>

<!-- RACE -->

<div id="race" class="screen">

<div class="light">
<div id="red"></div>
<div id="yellow"></div>
<div id="green"></div>
</div>

<div class="track">

<div id="player" class="car">🚗</div>
<div id="enemy" class="car">🚙</div>

</div>

<div class="hud">

<div>
<p>NITRO</p>
<div class="bar">
<div id="nitro" class="fill"></div>
</div>
</div>

<div class="speed">
Speed: <span id="speed">0</span>
</div>

<div class="gear">
Gear: <span id="gear">1</span>
</div>

</div>

<br>

<button class="menuBtn" onclick="accelerate()">PEDAL</button> <button class="menuBtn blue" onclick="shift()">SHIFT</button> <button class="menuBtn gray" onclick="showMenu()">MENU</button>

</div>

<!-- GARAGE -->

<div id="garage" class="screen">

<h2>Garage</h2>

<div class="garageCar" id="garageCar">🚗</div>

<br>

<button onclick="prevCar()">⬅</button> <button onclick="nextCar()">➡</button>

<br><br>

<button class="menuBtn gray" onclick="showMenu()">MENU</button>

</div>

<script>

let money=50000

let cars=["🚗","🚙","🚘","🚖","🚕","🚓","🚔","🏎️","🚐","🚑"]

let currentCar=0

let pos1=20
let pos2=20
let speed=0
let nitro=100
let gear=1

/* screen control */

function show(screen){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(screen).classList.add("active")

}

function showMenu(){show("menu")}
function openRace(){show("setup")}
function openGarage(){show("garage")}

/* garage */

function nextCar(){
currentCar=(currentCar+1)%cars.length
updateCar()
}

function prevCar(){
currentCar=(currentCar-1+cars.length)%cars.length
updateCar()
}

function updateCar(){
document.getElementById("garageCar").innerText=cars[currentCar]
}

/* start lights */

function startLights(){

show("race")

document.getElementById("red").className="red"

setTimeout(()=>{

document.getElementById("yellow").className="yellow"

},1000)

setTimeout(()=>{

document.getElementById("green").className="greenLight"

},2000)

}

/* race */

function accelerate(){

speed+=gear*2

pos1+=speed+Math.random()*10
pos2+=Math.random()*15

nitro-=3

if(nitro<0) nitro=0

document.getElementById("player").style.left=pos1+"px"
document.getElementById("enemy").style.left=pos2+"px"

document.getElementById("speed").innerText=Math.floor(speed)

document.getElementById("nitro").style.width=nitro+"%"

if(pos1>900||pos2>900){

if(pos1>pos2){

money+=5000
alert("Du vann! +5000$")

}else{

alert("Du förlorade")

}

document.getElementById("money").innerText=money
showMenu()

}

}

/* shifting */

function shift(){

if(gear<5){

gear++
document.getElementById("gear").innerText=gear

}

}

</script>

</body>
</html>
