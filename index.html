<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Snocross – GitHub One File</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #050814;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: linear-gradient(#0b1020, #050814);
    }
    #info {
      position: fixed;
      left: 10px;
      top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="info">
    Piltangenter: vänster/höger = styra, upp = gas, ned = broms<br>
    Tryck 1 / 2 / 3 för att byta skoter.
  </div>
  <canvas id="game" width="960" height="540"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;

    // ============================
    // SKOTERMODELLER
    // ============================
    const sledModels = [
      {
        name: "Stock 12-14",
        bodyColor: "#ffffff",
        accentColor: "#00eaff",
        length: 80,
        weight: 180,
        maxSpeed: 900,
        accel: 1800,
        whipPower: 2.5
      },
      {
        name: "Pro Lite",
        bodyColor: "#ff4444",
        accentColor: "#ffee00",
        length: 85,
        weight: 170,
        maxSpeed: 1050,
        accel: 2100,
        whipPower: 3.0
      },
      {
        name: "Open Mod",
        bodyColor: "#00ff55",
        accentColor: "#ffffff",
        length: 90,
        weight: 160,
        maxSpeed: 1200,
        accel: 2500,
        whipPower: 3.5
      }
    ];

    let currentModel = 0;

    // ============================
    // VÄRLD
    // ============================
    const world = {
      gravity: 2000,
      friction: 0.98,
      cameraX: 0
    };

    // ============================
    // INPUT
    // ============================
    const input = {
      left: false,
      right: false,
      gas: false,
      brake: false
    };

    // ============================
    // SKOTER
    // ============================
    const sled = {
      x: 100,
      y: 300,
      vx: 0,
      vy: 0,
      width: 80,
      height: 30,
      angle: 0,
      onGround: false,
      throttle: 0,
      maxSpeed: 900,
      accel: 1800,
      whipPower: 2.5,
      bodyColor: "#fff",
      accentColor: "#0ff"
    };

    function applyModel(i) {
      const m = sledModels[i];
      sled.width = m.length;
      sled.maxSpeed = m.maxSpeed;
      sled.accel = m.accel;
      sled.whipPower = m.whipPower;
      sled.bodyColor = m.bodyColor;
      sled.accentColor = m.accentColor;
    }

    applyModel(0);

    // ============================
    // BANA
    // ============================
    const track = [];
    (function buildTrack() {
      const baseY = 400;
      const segmentWidth = 200;
      let x = 0;
      for (let i = 0; i < 40; i++) {
        const bump = Math.sin(i * 0.6) * 80;
        track.push({ x, y: baseY + bump });
        x += segmentWidth;
      }
    })();

    function getTrackYAt(x) {
      if (x <= track[0].x) return track[0].y;
      if (x >= track[track.length - 1].x) return track[track.length - 1].y;

      for (let i = 0; i < track.length - 1; i++) {
        const a = track[i];
        const b = track[i + 1];
        if (x >= a.x && x <= b.x) {
          const t = (x - a.x) / (b.x - a.x);
          return a.y + (b.y - a.y) * t;
        }
      }
      return H;
    }

    // ============================
    // INPUT EVENTS
    // ============================
    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") input.left = true;
      if (e.key === "ArrowRight") input.right = true;
      if (e.key === "ArrowUp") input.gas = true;
      if (e.key === "ArrowDown") input.brake = true;

      if (e.key === "1") { currentModel = 0; applyModel(0); }
      if (e.key === "2") { currentModel = 1; applyModel(1); }
      if (e.key === "3") { currentModel = 2; applyModel(2); }
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") input.left = false;
      if (e.key === "ArrowRight") input.right = false;
      if (e.key === "ArrowUp") input.gas = false;
      if (e.key === "ArrowDown") input.brake = false;
    });

    // ============================
    // SPELLOOP
    // ============================
    let lastTime = performance.now();

    function loop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      // Gas / broms
      if (input.gas) sled.throttle += 2 * dt;
      else sled.throttle -= 3 * dt;
      if (input.brake) sled.throttle -= 5 * dt;
      sled.throttle = Math.max(0, Math.min(1, sled.throttle));

      // Acceleration
      sled.vx += sled.throttle * sled.accel * dt;
      if (sled.vx > sled.maxSpeed) sled.vx = sled.maxSpeed;

      // Whip
      if (!sled.onGround) {
        if (input.left) sled.angle -= sled.whipPower * dt;
        if (input.right) sled.angle += sled.whipPower * dt;
      } else {
        sled.angle *= 0.9;
      }

      sled.angle = Math.max(-0.6, Math.min(0.6, sled.angle));

      // Gravitation
      sled.vy += world.gravity * dt;

      // Position
      sled.x += sled.vx * dt;
      sled.y += sled.vy * dt;

      // Markkontakt
      const groundY = getTrackYAt(sled.x);
      if (sled.y + sled.height / 2 >= groundY) {
        sled.y = groundY - sled.height / 2;
        sled.vy = 0;
        sled.onGround = true;
      } else {
        sled.onGround = false;
      }

      // Friktion
      if (sled.onGround) sled.vx *= world.friction;

      // Kamera
      world.cameraX = sled.x - W * 0.3;
      if (world.cameraX < 0) world.cameraX = 0;
    }

    // ============================
    // RITNING
    // ============================
    function drawTrack() {
      ctx.strokeStyle = "#3cf";
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let i = 0; i < track.length; i++) {
        const sx = track[i].x - world.cameraX;
        const sy = track[i].y;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
    }

    function drawSled() {
      const sx = sled.x - world.cameraX;
      const sy = sled.y;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(sled.angle);

      ctx.fillStyle = sled.bodyColor;
      ctx.fillRect(-sled.width / 2, -sled.height / 2, sled.width, sled.height);

      ctx.fillStyle = sled.accentColor;
      ctx.fillRect(-sled.width / 2, -sled.height / 2 + 5, sled.width, 6);

      ctx.beginPath();
      ctx.arc(10, -sled.height / 2 - 10, 8, 0, Math.PI * 2);
      ctx.fillStyle = sled.accentColor;
      ctx.fill();

      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "#fff";
      ctx.font = "14px system-ui";
      ctx.fillText("Modell: " + sledModels[currentModel].name, 20, 30);
      ctx.fillText("Speed: " + Math.round(sled.vx), 20, 50);
      ctx.fillText("Throttle: " + sled.throttle.toFixed(2), 20, 70);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#050814");
      g.addColorStop(1, "#02040a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      drawTrack();
      drawSled();
      drawHUD();
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
