<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Racing Builder</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

header{
background:#222;
padding:10px;
font-size:24px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.panel{
background:#1c1c1c;
padding:15px;
border-radius:10px;
width:300px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#ff6a00;
color:white;
font-weight:bold;
}

button:hover{
background:#ff8c2f;
}

img{
width:100%;
border-radius:10px;
}

.car-list{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.slider{
width:100%;
}

.money{
font-size:20px;
color:#00ff7b;
}

@media(max-width:700px){
.container{
flex-direction:column;
align-items:center;
}
}
</style>
</head>

<body>

<header>🏁 Drag Racing Builder</header>

<div class="money">Pengar: $<span id="money"></span></div>

<div class="container">

<div class="panel">

<h3>Välj svårighet</h3>
<input type="range" min="1" max="100" value="50" class="slider" id="difficulty">
<p id="diffText">50</p>

<h3>Distans</h3>
<input type="range" min="100" max="10000" value="1000" class="slider" id="distance">
<p id="distText">1000 m</p>

<button onclick="startRace()">STARTA RACE</button>

</div>

<div class="panel">

<h3>Din bil</h3>

<img id="carImage" src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">

<p id="carName">Starter Car</p>

</div>

<div class="panel">

<h3>Köp bilar</h3>

<div class="car-list" id="carShop"></div>

</div>

<div class="panel">

<h3>Uppgraderingar</h3>

<button onclick="upgrade('engine')">Motor</button>
<button onclick="upgrade('body')">Body kit</button>
<button onclick="upgrade('wing')">Wing</button>
<button onclick="upgrade('rims')">Fälgar</button>
<button onclick="upgrade('tires')">Däck</button>

</div>

</div>

<script>

// SKAPAREN ÄNDRAR PENGAR HÄR
let money = 50000;

let cars = [
{name:"Starter",price:0,img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{name:"Street Racer",price:10000,img:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c"},
{name:"Turbo Coupe",price:20000,img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"},
{name:"Drag Beast",price:30000,img:"https://images.unsplash.com/photo-1503736334956-4c8f8e92946d"},
{name:"Nitro GT",price:40000,img:"https://images.unsplash.com/photo-1517524008697-84bbe3c3fd98"},
{name:"V8 Monster",price:60000,img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{name:"Hyper Racer",price:80000,img:"https://images.unsplash.com/photo-1493238792000-8113da705763"},
{name:"Track King",price:100000,img:"https://images.unsplash.com/photo-1503736334956-4c8f8e92946d"},
{name:"Carbon Drag",price:150000,img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"},
{name:"Ultimate Racer",price:200000,img:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c"}
]

let owned=[0]
let currentCar=0

function updateMoney(){
document.getElementById("money").innerText=money
}

function buildShop(){

let shop=document.getElementById("carShop")

cars.forEach((car,i)=>{

let btn=document.createElement("button")
btn.innerText=car.name+" $"+car.price

btn.onclick=()=>buyCar(i)

shop.appendChild(btn)

})

}

function buyCar(id){

let car=cars[id]

if(money>=car.price){

money-=car.price
owned.push(id)

selectCar(id)

updateMoney()

}else{

alert("Inte tillräckligt pengar!")

}

}

function selectCar(id){

currentCar=id

document.getElementById("carImage").src=cars[id].img
document.getElementById("carName").innerText=cars[id].name

}

function upgrade(type){

if(money>=5000){

money-=5000
updateMoney()
alert(type+" uppgraderad!")

}else{

alert("Inte tillräckligt pengar!")

}

}

function startRace(){

let diff=document.getElementById("difficulty").value
let dist=document.getElementById("distance").value

let winChance=100-diff+Math.random()*50

if(winChance>50){

let reward=Math.floor(dist/5)
money+=reward

alert("Du vann! +" + reward + "$")

}else{

alert("Du förlorade racet!")

}

updateMoney()

}

document.getElementById("difficulty").oninput=(e)=>{
document.getElementById("diffText").innerText=e.target.value
}

document.getElementById("distance").oninput=(e)=>{
document.getElementById("distText").innerText=e.target.value+" m"
}

updateMoney()
buildShop()

</script>

</body>
</html>
