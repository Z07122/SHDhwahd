<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>Snocross – GitHub One File</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #050814;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: linear-gradient(#0b1020, #050814);
    }
    #info {
      position: fixed;
      left: 10px;
      top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="info">
    Piltangenter: vänster/höger = styra, upp = gas, ned = broms<br>
    Hoppa genom att köra över backar.
  </div>
  <canvas id="game" width="960" height="540"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;

    // Värld
    const world = {
      gravity: 2000,
      friction: 0.98,
      cameraX: 0
    };

    // Input
    const input = {
      left: false,
      right: false,
      gas: false,
      brake: false
    };

    // Skoter
    const sled = {
      x: 100,
      y: 300,
      vx: 0,
      vy: 0,
      width: 80,
      height: 30,
      angle: 0,
      onGround: false,
      throttle: 0,
      maxSpeed: 900
    };

    // Enkel bana: en serie segment (x, y)
    const track = [];
    (function buildTrack() {
      const baseY = 400;
      const segmentWidth = 200;
      let x = 0;
      let y = baseY;
      for (let i = 0; i < 40; i++) {
        const bump = Math.sin(i * 0.6) * 80;
        track.push({ x, y: baseY + bump });
        x += segmentWidth;
      }
    })();

    // Input events
    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") input.left = true;
      if (e.key === "ArrowRight") input.right = true;
      if (e.key === "ArrowUp") input.gas = true;
      if (e.key === "ArrowDown") input.brake = true;
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") input.left = false;
      if (e.key === "ArrowRight") input.right = false;
      if (e.key === "ArrowUp") input.gas = false;
      if (e.key === "ArrowDown") input.brake = false;
    });

    function getTrackYAt(x) {
      if (track.length < 2) return H;
      if (x <= track[0].x) return track[0].y;
      if (x >= track[track.length - 1].x) return track[track.length - 1].y;

      for (let i = 0; i < track.length - 1; i++) {
        const a = track[i];
        const b = track[i + 1];
        if (x >= a.x && x <= b.x) {
          const t = (x - a.x) / (b.x - a.x);
          return a.y + (b.y - a.y) * t;
        }
      }
      return H;
    }

    let lastTime = performance.now();

    function loop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      // Gas / broms
      if (input.gas) {
        sled.throttle += 2 * dt;
      } else {
        sled.throttle -= 3 * dt;
      }
      if (input.brake) {
        sled.throttle -= 5 * dt;
      }
      sled.throttle = Math.max(0, Math.min(1, sled.throttle));

      // Horisontell kraft
      const accel = 1800;
      sled.vx += sled.throttle * accel * dt;

      // Sidostyrning i luften (whip)
      if (!sled.onGround) {
        if (input.left) sled.angle -= 2.5 * dt;
        if (input.right) sled.angle += 2.5 * dt;
      } else {
        // På marken – stabilisera
        sled.angle *= 0.9;
      }

      // Begränsa vinkel
      const maxAngle = 0.6;
      if (sled.angle > maxAngle) sled.angle = maxAngle;
      if (sled.angle < -maxAngle) sled.angle = -maxAngle;

      // Begränsa hastighet
      if (sled.vx > sled.maxSpeed) sled.vx = sled.maxSpeed;
      if (sled.vx < 0) sled.vx = 0;

      // Gravitation
      sled.vy += world.gravity * dt;

      // Position
      sled.x += sled.vx * dt;
      sled.y += sled.vy * dt;

      // Kollision med mark
      const groundY = getTrackYAt(sled.x);
      if (sled.y + sled.height / 2 >= groundY) {
        sled.y = groundY - sled.height / 2;
        sled.vy = 0;
        sled.onGround = true;
      } else {
        sled.onGround = false;
      }

      // Friktion
      if (sled.onGround) {
        sled.vx *= world.friction;
      }

      // Kamera
      world.cameraX = sled.x - W * 0.3;
      if (world.cameraX < 0) world.cameraX = 0;
    }

    function drawTrack() {
      ctx.strokeStyle = "#3cf";
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let i = 0; i < track.length; i++) {
        const sx = track[i].x - world.cameraX;
        const sy = track[i].y;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
    }

    function drawSled() {
      const sx = sled.x - world.cameraX;
      const sy = sled.y;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(sled.angle);

      // Skoterkropp
      ctx.fillStyle = "#fff";
      ctx.fillRect(-sled.width / 2, -sled.height / 2, sled.width, sled.height);

      // Förarens “huvud”
      ctx.beginPath();
      ctx.arc(10, -sled.height / 2 - 10, 8, 0, Math.PI * 2);
      ctx.fillStyle = "#0ff";
      ctx.fill();

      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "#fff";
      ctx.font = "14px system-ui";
      ctx.fillText("Speed: " + Math.round(sled.vx) + " px/s", 20, 30);
      ctx.fillText("Throttle: " + sled.throttle.toFixed(2), 20, 50);
      ctx.fillText("On ground: " + (sled.onGround ? "ja" : "nej"), 20, 70);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Bakgrund
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#050814");
      g.addColorStop(1, "#02040a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // Mark
      drawTrack();

      // Skoter
      drawSled();

      // HUD
      drawHUD();
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
